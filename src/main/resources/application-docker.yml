# Profile "docker": dung khi chay app trong docker-compose voi PostgreSQL.
# Kich hoat bang bien moi truong SPRING_PROFILES_ACTIVE=docker (xem docker-compose.yml).
# Cac gia tri ${...} duoc lay tu bien moi truong cua container, truyen vao tu file .env.

spring:
  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # bonus: in luôn giá trị tham số thay vì chỉ thấy "?"

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000
