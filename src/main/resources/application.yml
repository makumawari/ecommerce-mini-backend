server:
  port: 8080

spring:
  application:
    name: ecommerce-mini-backend

  # ====== DATABASE: H2 in-memory ======
  # Chay ngay khong can cai dat gi, du lieu mat khi restart app (phu hop de luyen tap/demo).
  # Muon dung MySQL/PostgreSQL thuc thi doi block "datasource" duoi day, vi du voi MySQL:
  #
  # datasource:
  #   url: jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true
  #   username: root
  #   password: your_password
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #
  datasource:
    url: jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console   # Truy cap http://localhost:8080/h2-console de xem du lieu truc tiep

  jpa:
    hibernate:
      ddl-auto: update   # Tu dong tao/cap nhat bang theo Entity. Production thuong dung "validate" + migration tool (Flyway/Liquibase).
    show-sql: false       # In cau SQL ra console - rat huu ich de hoc va debug
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# logging:
#   level:
#     org.hibernate.SQL: DEBUG
#     org.hibernate.orm.jdbc.bind: TRACE   # bonus: in luôn giá trị tham số thay vì chỉ thấy "?"

# ====== JWT CONFIG (move to environment on next phase)======
jwt:
  # Trong thuc te, secret phai dat trong bien moi truong, KHONG hardcode nhu the nay.
  secret: "ThisIsADemoSecretKeyForJWT_PleaseChangeInProduction_MakeItLongEnough123456"
  expiration-ms: 86400000   # 24 gio
